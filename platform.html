<body>
<main><div class="container">
<nav class="nav" aria-label="Main navigation"><a href="/" class="nav-brand">Energy<em>Board</em></a><div class="nav-links"><a href="/">Board</a><a href="/compare.html">Compare</a><a href="/history.html">History</a><a href="/blog.html">Blog</a></div></nav>
<div id="content"><div class="loading">Loading platform data...</div></div>
</div></main>
<footer class="footer"><div class="container" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;width:100%"><span>© 2026 Energy Price Board</span><span><a href="/">Board</a> · <a href="/compare.html">Compare</a> · <a href="/blog.html">Blog</a></span></div></footer>

<script>
(()=>{
'use strict';
var FEATURES = [
  {id:'api',label:'API',icon:'🔌'},{id:'telegram',label:'Telegram',icon:'💬'},{id:'marketplace',label:'Marketplace',icon:'📊'},
  {id:'autotopup',label:'Auto-topup',icon:'🔄'},{id:'usdt_trx',label:'USDT-TRX',icon:'💱'},{id:'dapp',label:'dApp',icon:'🔗'},
  {id:'referral',label:'Referral',icon:'🎁'},{id:'staking',label:'Staking',icon:'🏦'},{id:'bandwidth',label:'Bandwidth',icon:'📡'}
];
var PLATFORM_FEATURES = {
  apitrx:['api','autotopup'],brutus:['marketplace','dapp'],catfee:['autotopup'],energyfather:['api','referral'],
  ergon:['dapp','staking'],feee:['api','referral','usdt_trx'],feesaver:['telegram','referral','autotopup'],
  itrx:['api','referral'],justlend_dao:['dapp','staking'],mefree:['api'],netts:[],refee:['telegram','referral'],
  renttron:[],tofee:['dapp'],tr_energy:['referral'],tronex:['api','telegram','referral'],tronify:['api','referral'],
  tronmax:['marketplace','api','referral'],tronsave:['staking'],tronzap:['referral']
};
var pid = new URLSearchParams(location.search).get('id') || '';
var $=id=>document.getElementById(id);
function fmt(n){return(typeof n==='number'&&isFinite(n))?n.toFixed(2):'--';}

fetch('/result.json',{cache:'no-store'}).then(function(r){return r.json();}).then(function(data){
  var p = (data.platforms||[]).find(function(x){return x.platform_id===pid;});
  if(!p){document.getElementById('content').innerHTML='<div class="loading">Platform not found. <a href="/" style="color:var(--blue)">Back to board</a></div>';return;}
  var name=p.platform_name||pid,terms=['15m','1h','1d','3d','10d'];
  var pfeats=PLATFORM_FEATURES[pid]||[],refUrl=p.referral_url||p.url||'';
  document.title=name+' — TRON Energy Rental Review | Energy Price Board';
  var desc='Live '+name+' energy rental prices. 65k from '+(typeof p['65k_1h_price']==='number'?fmt(p['65k_1h_price']):'N/A')+' TRX, 130k from '+(typeof p['130k_1h_price']==='number'?fmt(p['130k_1h_price']):'N/A')+' TRX. Features, API, and comparison.';
  document.querySelector('meta[name="description"]').setAttribute('content',desc);
  document.querySelector('meta[property="og:title"]').setAttribute('content',name+' — TRON Energy Rental Review');
  document.querySelector('meta[property="og:description"]').setAttribute('content',desc);
  document.querySelector('meta[name="twitter:title"]').setAttribute('content',name+' — TRON Energy Review');
  document.querySelector('meta[name="twitter:description"]').setAttribute('content',desc);

  var priceRows='';
  terms.forEach(function(t){
    var v65=p['65k_'+t+'_price'],v130=p['130k_'+t+'_price'];
    if(typeof v65==='number')priceRows+='<tr><td>65k · '+t+'</td><td style="font-weight:700;color:var(--ink-white)">'+fmt(v65)+' TRX</td></tr>';
    if(typeof v130==='number')priceRows+='<tr><td>130k · '+t+'</td><td style="font-weight:700;color:var(--ink-white)">'+fmt(v130)+' TRX</td></tr>';
  });
  var p65=typeof p['65k_1h_price']==='number'?p['65k_1h_price']:null;
  var p130=typeof p['130k_1h_price']==='number'?p['130k_1h_price']:null;
  var cheap65=data.platforms.filter(function(x){return typeof x['65k_1h_price']==='number';}).sort(function(a,b){return a['65k_1h_price']-b['65k_1h_price'];});
  var isBest=p65!==null&&cheap65.length&&p65===cheap65[0]['65k_1h_price'];

  var featChips='';
  FEATURES.forEach(function(f){var has=pfeats.indexOf(f.id)!==-1;featChips+='<span class="f-chip'+(has?' has':' no')+'">'+f.icon+' '+f.label+'</span>';});

  document.getElementById('ld-breadcrumb').textContent=JSON.stringify({"@context":"https://schema.org","@type":"BreadcrumbList","itemListElement":[{"@type":"ListItem","position":1,"name":"Energy Price Board","item":"https://energypriceboard.tech/"},{"@type":"ListItem","position":2,"name":"Compare","item":"https://energypriceboard.tech/compare.html"},{"@type":"ListItem","position":3,"name":name+" Review"}]});
  document.getElementById('ld-product').textContent=JSON.stringify({"@context":"https://schema.org","@type":"Product","name":name+" — TRON Energy Rental","description":desc,"url":refUrl,"offers":{"@type":"AggregateOffer","lowPrice":p65?fmt(p65):"N/A","highPrice":p130?fmt(p130):"N/A","priceCurrency":"TRX"}});

  document.getElementById('content').innerHTML=
    '<div class="breadcrumb"><a href="/">Home</a> / <a href="/compare.html">Compare</a> / <span>'+name+'</span></div>'+
    '<h1>'+name+' <span style="font-size:14px;color:'+(isBest?'var(--green)':'var(--ink-secondary)')+';font-weight:600;vertical-align:middle">'+(isBest?'★ Best Price':'')+'</span></h1>'+
    '<p class="subtitle">TRON energy rental platform — live prices and features</p>'+
    '<div class="prices-grid">'+
      '<div class="price-box"><div class="amount">65k · 1 Hour</div><div class="value'+(isBest?' best':'')+'">'+fmt(p65)+' TRX</div></div>'+
      '<div class="price-box"><div class="amount">130k · 1 Hour</div><div class="value">'+fmt(p130)+' TRX</div></div>'+
    '</div>'+
    '<a class="cta-btn cta-primary" href="'+refUrl+'" target="_blank" rel="nofollow noopener">'+(p.has_referral?'🎁 Rent Energy':'Visit '+name)+'</a>'+
    '<a class="cta-btn cta-secondary" href="/compare.html">Compare All Platforms</a>'+
    '<h2>Features</h2><div class="features-chips">'+featChips+'</div>'+
    '<div class="info-grid">'+
      '<div class="info-item"><div class="il">API Access</div><div class="iv'+(pfeats.indexOf('api')!==-1?' yes':' no')+'">'+(pfeats.indexOf('api')!==-1?'✓ Yes':'--')+'</div></div>'+
      '<div class="info-item"><div class="il">Telegram Bot</div><div class="iv'+(pfeats.indexOf('telegram')!==-1?' yes':' no')+'">'+(pfeats.indexOf('telegram')!==-1?'✓ Yes':'--')+'</div></div>'+
      '<div class="info-item"><div class="il">Referral Program</div><div class="iv'+(pfeats.indexOf('referral')!==-1?' yes':' no')+'">'+(pfeats.indexOf('referral')!==-1?'✓ Yes':'--')+'</div></div>'+
      '<div class="info-item"><div class="il">Minimum Order</div><div class="iv">'+(p.minimum_order_energy&&p.minimum_order_energy!=='N/A'?p.minimum_order_energy:'No limit')+'</div></div>'+
    '</div>'+
    '<h2>All Prices</h2><table style="width:100%;border-collapse:collapse;font-size:14px">'+priceRows+'</table>'+
    '<p style="margin-top:16px;color:var(--ink-secondary);font-size:13px">Prices updated: '+(p.ts?new Date(p.ts).toISOString().slice(0,19).replace('T',' ')+' UTC':'N/A')+'</p>';
});
})();
</script>
